name: Sync Feature Branches to Hugging Face Hub
on:
  push:
    branches:
      - "feature/deployment-spaces"  # Triggers only on feature branches

  # Allow manual triggering
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true  # Ensure LFS files are fetched

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://MaheshBhat45:$HF_TOKEN@huggingface.co/spaces/MaheshBhat45/attrition_prediction develop:main
